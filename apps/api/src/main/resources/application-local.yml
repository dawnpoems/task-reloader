spring:
  application:
    name: task-reloader-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/task_reloader}
    username: ${SPRING_DATASOURCE_USERNAME:task_reloader}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_in_production}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    placeholders:
      auth_admin_email: ${AUTH_ADMIN_EMAIL:admin@task-reloader.local}
      auth_admin_password_hash: ${AUTH_ADMIN_PASSWORD_HASH:__CHANGE_ME_WITH_BCRYPT_HASH__}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:__CHANGE_ME_WITH_AT_LEAST_32_BYTE_SECRET__}
    access-token-ttl-seconds: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:1209600}
  password:
    bcrypt-strength: ${AUTH_BCRYPT_STRENGTH:12}
  refresh-cookie:
    name: ${AUTH_REFRESH_COOKIE_NAME:refresh_token}
    path: ${AUTH_REFRESH_COOKIE_PATH:/api/auth}
    secure: ${AUTH_REFRESH_COOKIE_SECURE:false}
    same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
